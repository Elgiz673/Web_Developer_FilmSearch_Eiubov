  <link rel="stylesheet" href="../style/lists.css" />

  <title>Сериалы - Что сегодня посмотреть?</title>
</head>

<body>
  <div class="main-container">
    <header class="rectangle">
      <a class="diplom-logo" href="../index.html" aria-label="На главную">
        <img src="../assets/icons/remote/bwoRxEsezm.png" alt="Логотип Что сегодня посмотреть"
          class="diplom-logo__img" />
      </a>
      <label class="theme-toggle" for="theme-checkbox">
        <input type="checkbox" id="theme-checkbox" />
        <span class="toggle-slider"></span>
      </label>
      <span class="theme-label">Тёмная тема</span>
      <nav class="top-nav" aria-label="Основная навигация">
        <a class="movies" href="../movie_list/index.html">Фильмы</a>
        <a class="series" href="index.html" aria-current="page">Сериалы</a>
      </nav>
    </header>

    <div class="flex-row-c">
      <div class="rectangle-1">
        <div class="rectangle-2">
          <form id="search-form" class="search-form">
            <input type="text" id="search-query" class="search-input" placeholder="Какой сериал сегодня посмотреть?" />
            <button type="submit" class="frame search-btn"><span class="search">Найти</span></button>
          </form>
        </div>
      </div>

      <form class="filter" id="filter-form" aria-label="Фильтры сериалов">
        <div class="default-property">
          <div class="filter-3">
            <label class="genre" for="genre-filter">Жанр</label>
            <div class="frame-4">
              <select id="genre-filter" class="filter-select">
                <option value="">Все жанры</option>
                <option value="fantasy">Фэнтези</option>
                <option value="drama">Драма</option>
                <option value="thriller">Триллер</option>
                <option value="scifi">Фантастика</option>
                <option value="crime">Криминал</option>
                <option value="comedy">Комедия</option>
              </select>
            </div>
          </div>

          <div class="frame-6">
            <label class="rating" for="rating-filter">Рейтинг</label>
            <div class="frame-7">
              <select id="rating-filter" class="filter-select">
                <option value="">Выбрать рейтинг</option>
                <option value="9">от 9</option>
                <option value="8">от 8</option>
                <option value="7">от 7</option>
              </select>
            </div>
          </div>
          <div class="frame-6">
            <label class="rating" for="director-filter">Режиссёр</label>
            <div class="frame-7">
              <input type="text" id="director-filter" class="filter-select filter-input" placeholder="Введите режиссёра"
                autocomplete="off" />
            </div>
          </div>

          <div class="frame-b">
            <label class="genre-c" for="country-filter">Страна</label>
            <div class="frame-d">
              <select id="country-filter" class="filter-select">
                <option value="">Все страны</option>
                <option value="usa">США</option>
                <option value="uk">Великобритания</option>
                <option value="russia">Россия</option>
              </select>
            </div>
          </div>

          <div class="frame-10">
            <label class="genre-11" for="year-filter">Год выпуска</label>
            <div class="frame-12">
              <select id="year-filter" class="filter-select">
                <option value="">Все годы</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
              </select>
            </div>
          </div>
        </div>
      </form>

      <h1 class="films-16">Сериалы</h1>
      <div class="pagination-top" id="pagination-top"></div>
      <div class="cards-grid" id="cards-grid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
